<!DOCTYPE html>
<html>

<head>
    <title>Create Profile</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI,sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(
                -45deg,
                #020617,
                #0f172a,
                #111827,
                #1e3a8a
            );

            background-size:400% 400%;
            animation:bgmove 15s ease infinite;

            padding:20px;
        }

        @keyframes bgmove{

            0%{
                background-position:0% 50%;
            }

            50%{
                background-position:100% 50%;
            }

            100%{
                background-position:0% 50%;
            }
        }

        .container{
            width:95%;
            max-width:700px;
        }

        .glass-box{

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);

            border:1px solid rgba(255,255,255,0.1);

            border-radius:25px;

            padding:30px;

            margin-bottom:25px;

            color:white;

            position:relative;
            overflow:hidden;

            box-shadow:
            0 10px 30px rgba(0,0,0,0.3);
        }

        .glass-box::before{

            content:"";

            position:absolute;

            top:-100%;
            left:-50%;

            width:50%;
            height:300%;

            background:linear-gradient(
                90deg,
                transparent,
                rgba(255,255,255,0.08),
                transparent
            );

            transform:rotate(25deg);

            animation:shine 8s linear infinite;
        }

        @keyframes shine{

            0%{
                left:-70%;
            }

            100%{
                left:150%;
            }
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:white;
            font-size:40px;
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-size:17px;
        }

        input{

            width:100%;

            padding:15px;

            border:none;

            border-radius:15px;

            background:rgba(255,255,255,0.08);

            color:white;

            font-size:16px;

            outline:none;

            margin-bottom:20px;
        }

        input::placeholder{
            color:#cbd5e1;
        }

        button{

            width:100%;

            padding:15px;

            border:none;

            border-radius:15px;

            font-size:18px;

            cursor:pointer;
        }

        .create-btn{
            background:#2563eb;
            color:white;
        }

        .service-btn{
            background:#10b981;
            color:white;
        }

    </style>

</head>

<body>

<div class="container">

    <!-- PROFILE BOX -->

    <div class="glass-box">

        <h1>Create Profile</h1>

        <form action="/create_profile" method="POST">

            <label>Profile Name</label>

            <input
            type="text"
            name="profile_name"
            placeholder="Enter Profile Name"
            required>

            <label>Profile Password</label>

            <input
            type="password"
            name="profile_pass"
            placeholder="Enter Profile Password"
            required>

            <button
            type="submit"
            class="create-btn">
            Create Profile
            </button>

        </form>

    </div>

    <!-- CUSTOMER SERVICE BOX -->

    <div class="glass-box">

        <h2>Need Help?</h2>

        <a href="/customer_service">

            <button
            type="button"
            class="service-btn">
            Customer Service
            </button>

        </a>

    </div>

</div>

</body>

</html>
