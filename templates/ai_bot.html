<!DOCTYPE html>
<html>
<head>
    <title>WEBSITE AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, #020617, #0f172a, #111827, #1e3a8a);
            background-size: 400% 400%;
            animation: bgmove 12s ease infinite;
            padding: 20px;
        }

        @keyframes bgmove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 30px;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .container::before {
            content: "";
            position: absolute;
            top: -100%;
            left: -50%;
            width: 40%;
            height: 300%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            transform: rotate(25deg);
            animation: shine 8s linear infinite;
        }

        @keyframes shine {
            0% { left: -60%; }
            100% { left: 150%; }
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 38px;
        }

        form {
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            align-items: center;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: white;
            font-size: 16px;
            outline: none;
        }

        input::placeholder {
            color: #cbd5e1;
        }

        /* Redesigned Premium & Smaller Button Layout */
        button {
            padding: 10px 22px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            white-space: nowrap;
        }

        button:hover {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 6px rgba(37, 99, 235, 0.3);
        }

        .user-box {
            margin-top: 20px;
            margin-left: auto;
            width: 80%;
            background: #2563eb;
            padding: 15px;
            border-radius: 18px;
            line-height: 1.7;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
        }

        .ai-box {
            margin-top: 20px;
            width: 80%;
            background: rgba(255, 255, 255, 0.08);
            border-left: 4px solid #00ffcc;
            padding: 15px;
            border-radius: 18px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: #cbd5e1;
            font-size: 13px;
        }

        @media(max-width:600px) {
            .user-box, .ai-box {
                width: 100%;
            }
            h1 {
                font-size: 30px;
            }
            form {
                padding: 4px;
                border-radius: 14px;
            }
            button {
                padding: 8px 16px;
                font-size: 13px;
                border-radius: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 WEBSITE AI</h1>
        
        <form method="POST">
            <input type="text" name="message" placeholder="Ask anything..." required autocomplete="off">
            <button type="submit">Send</button>
        </form>

        {% if question %}
        <div class="user-box">
            <b>You:</b> {{ question }}
        </div>
        {% endif %}

        {% if answer %}
        <div class="ai-box">
            <b>AI:</b> {{ answer }}
        </div>
        {% endif %}

        <div class="footer">
            ABISHEK WEBSITE • AI Assistant
        </div>
    </div>
</body>
  </html>
