<!DOCTYPE html>
<html>

<head>

<title>ABI'S WEBSITE</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        -45deg,
        #0f172a,
        #1e3a8a,
        #7c3aed,
        #2563eb
    );

    background-size:400% 400%;

    animation:gradientMove 12s ease infinite;
}

@keyframes gradientMove{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }

}

.container{

    width:90%;
    max-width:900px;

    background:rgba(
        255,
        255,
        255,
        0.08
    );

    backdrop-filter:blur(15px);

    border-radius:25px;

    padding:40px;

    text-align:center;

    color:white;

    box-shadow:
    0 10px 40px
    rgba(0,0,0,0.4);

    animation:fadeIn 1.5s;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(50px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

h1{

    font-size:42px;

    margin-bottom:15px;

    animation:glow 3s infinite;
}

@keyframes glow{

    0%{
        text-shadow:0 0 10px #38bdf8;
    }

    50%{
        text-shadow:
        0 0 25px #38bdf8;
    }

    100%{
        text-shadow:0 0 10px #38bdf8;
    }

}

.subtitle{

    color:#dbeafe;

    margin-bottom:35px;
}

.links{

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    gap:20px;
}

.links a{

    text-decoration:none;

    color:white;

    background:
    rgba(
        255,
        255,
        255,
        0.12
    );

    padding:15px 25px;

    border-radius:15px;

    transition:0.3s;

    min-width:220px;
}

.links a:hover{

    transform:
    translateY(-5px)
    scale(1.05);

    background:
    rgba(
        255,
        255,
        255,
        0.25
    );

    box-shadow:
    0 0 20px
    rgba(
        255,
        255,
        255,
        0.3
    );
}

.footer{

    margin-top:40px;

    color:#cbd5e1;

    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h1>ABI WEBSITE</h1>

<p class="subtitle">
Official Website • Designed & Developed By Abishek
</p>

<div class="links">

<a href="/user_statement">
Launch Application
</a>

<a href="/about">
 About Website
</a>

<a href="/owner">
 About Owner
</a>

<a href="/contact">
 Contact Us
</a>

<a href="/policy">
 Privacy Policy
</a>

<a href="/banned">
 Banned Users(who interacted with abnormals)
</a>

</div>

<div class="footer">

Build • Connect • Create

</div>

</div>

</body>

</html>
