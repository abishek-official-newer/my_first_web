<!DOCTYPE html>
<html>

<head>

<title>A&co WEBSITE</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    background:
    linear-gradient(
        -45deg,
        #0f172a,
        #111827,
        #1e293b,
        #0f172a
    );

    background-size:400% 400%;

    animation:
    gradientMove 18s ease infinite;
}

@keyframes gradientMove{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }

}

.container{

    width:90%;

    max-width:1000px;

    padding:50px;

    border-radius:30px;

    background:
    rgba(
        255,
        255,
        255,
        0.06
    );

    backdrop-filter:blur(20px);

    border:
    1px solid
    rgba(
        255,
        255,
        255,
        0.15
    );

    color:white;

    text-align:center;

    animation:
    slideUp 1.2s ease;

    transition:0.4s;
}

.container:hover{

    transform:
    translateY(-5px);

}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(50px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

h1{

    font-size:52px;

    font-weight:700;

    margin-bottom:20px;

    letter-spacing:2px;

}
@keyframes slideUp{

    from{

        opacity:0;

        transform:
        translateY(60px);

    }

    to{

        opacity:1;

        transform:
        translateY(0);

    }

}    

@keyframes glow{

    0%{
        text-shadow:0 0 10px #38bdf8;
    }

    50%{
        text-shadow:
        0 0 25px #38bdf8;
    }

    100%{
        text-shadow:0 0 10px #38bdf8;
    }

}

.subtitle{

    color:#dbeafe;

    margin-bottom:35px;
}

.links{

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    gap:20px;
}

.links a{

    text-decoration:none;

    color:white;

    background:
    rgba(
        255,
        255,
        255,
        0.12
    );

    padding:15px 25px;

    border-radius:15px;

    transition:0.3s;

    min-width:220px;
}

.links a{

    text-decoration:none;

    color:white;

    background:
    rgba(
        255,
        255,
        255,
        0.08
    );

    border:
    1px solid
    rgba(
        255,
        255,
        255,
        0.1
    );

    padding:18px 28px;

    border-radius:18px;

    min-width:240px;

    transition:0.35s;

    font-weight:600;

}
.footer{

    margin-top:40px;

    color:#cbd5e1;

    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h1>A&co WEBSITE</h1>

Official Website • Designed & Developed By Abishek

</html>
